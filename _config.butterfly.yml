# ==========================================
# 主题配色
# ==========================================
theme_color:
  enable: true
  main: "#425AEF"
  paginator: "#425AEF"
  button_hover: "#FF7242"
  text_selection: "#425AEF"
  link_color: "#425AEF"
  meta_color: "#858585"
  hr_color: "#A4D8FA"
  code_foreground: "#F47466"
  code_background: "rgba(27, 31, 35, .05)"
  toc_color: "#425AEF"
  blockquote_padding_color: "#425AEF"
  blockquote_background_color: "#425AEF"
  scrollbar_color: "#425AEF"
  meta_theme_color_light: "ffffff"
  meta_theme_color_dark: "#0d0d0d"

# ==========================================
# 网站背景图片
# ==========================================
background: /img/website_bg.jpg

# ==========================================
# 注入自定义 CSS
# ==========================================
inject:
  head:
    - <link rel="stylesheet" href="/css/custom.css">

# ==========================================
# 导航栏
# ==========================================
nav:
  logo:
  display_title: true
  default_theme: false

menu:
  首页: / || fas fa-home
  文章 || fas fa-book:
    归档: /archives/ || fas fa-archive
    分类: /categories/ || fas fa-folder-open
    标签: /tags/ || fas fa-tags
  关于: /about/ || fas fa-user
  友链: /links/ || fas fa-link

# ==========================================
# 头像
# ==========================================
avatar:
  img: /img/avatar.jpg
  effect: false

# ==========================================
# 首页顶部 Banner
# ==========================================
index_img: /img/banner.jpg

# ==========================================
# 文章默认封面
# ==========================================
cover:
  index_enable: true
  aside_enable: true
  archives_enable: true
  position: both
  default_cover:
    - /img/covers/1.jpg
    - /img/covers/2.jpg
    - /img/covers/3.jpg

# ==========================================
# 站点副标题打字机效果
# ==========================================
subtitle:
  enable: true
  effect: true
  loop: true
  source: false
  sub:
    - 记录折腾的地方
    - 技术笔记 & 瞎折腾
    - Keep Learning

# ==========================================
# 本地搜索
# ==========================================
search:
  use: local_search

local_search:
  enable: true
  preload: false
  CDN:

# ==========================================
# CDN
# ==========================================
CDN:
  internal_provider: local

# ==========================================
# 评论系统（Giscus）
# ==========================================
comments:
  use: Giscus
  text: true
  lazyload: false
  count: false
  hide_empty_comment: false

giscus:
  repo: chasehl/chasehl.github.io
  repo_id: R_kgDON3lWOw
  category_id: DIC_kwDON3lWO84C4PJp
  theme:
    light: light
    dark: dark
  option:

# ==========================================
# 图片懒加载
# ==========================================
lazyload:
  enable: true
  field: site
  placeholder:
  blur: false

# ==========================================
# 图片点击放大
# ==========================================
medium_zoom: false
fancybox: true

# ==========================================
# 页脚
# ==========================================
footer:
  owner:
    enable: true
    since: 2024
  custom_text: '由 <a href="https://hexo.io" target="_blank">Hexo</a> 驱动 &nbsp;|&nbsp; 主题 <a href="https://butterfly.js.org" target="_blank">Butterfly</a> &nbsp;|&nbsp; 托管于 <a href="https://github.com/chasehl/chasehl.github.io" target="_blank">GitHub Pages</a>'
  copyright: true
  runtime: true

footer_img: /img/footer_bg.jpg

# ==========================================
# 侧边栏
# ==========================================
aside:
  enable: true
  hide: false
  button: true
  mobile: false
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description: 记录折腾过程的地方
    button:
      enable: true
      icon: fab fa-github
      text: GitHub
      link: https://github.com/chasehl
  card_announcement:
    enable: true
    content: 欢迎来到 ChaseLog，这里记录我的折腾历程 🚀
  card_recent_post:
    enable: true
    limit: 5
    sort: date
    sort_order:
  card_categories:
    enable: true
    limit: 8
    expand: none
    order_by: name
  card_tags:
    enable: true
    limit: 40
    color: true
    order_by: name
    order_type: 1
  card_archives:
    enable: true
    type: monthly
    format: MMMM YYYY
    order: -1
    limit: 8
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true
    sort_order:

# ==========================================
# 深色模式
# ==========================================
dark_mode:
  enable: true
  default: light

# ==========================================
# 代码块
# ==========================================
highlight_theme: mac
highlight_copy: true
highlight_lang: true
highlight_shrink: false
highlight_height_limit: false

# ==========================================
# 文章页配置
# ==========================================
post_meta:
  page:
    date_type: both
    date_format: date
    categories: true
    tags: true
    label: true
  post:
    date_type: both
    date_format: date
    categories: true
    tags: true
    label: true

# 文章字数统计 & 阅读时长（需要 hexo-wordcount）
wordcount:
  enable: true
  post_wordcount: true
  min2read: true
  total_wordcount: true

# ==========================================
# 文章目录（TOC）
# ==========================================
toc:
  post: true
  page: false
  number: true
  expand: true
  style_simple: false
  scroll_percent: true

# ==========================================
# 文章版权声明
# ==========================================
post_copyright:
  enable: true
  decode: false
  author_href:
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# ==========================================
# 文章打赏
# ==========================================
reward:
  enable: false
  QR_code:

# ==========================================
# 相关文章推荐
# ==========================================
related_post:
  enable: true
  limit: 6
  date_type: created

# ==========================================
# 文章过期提醒
# ==========================================
noticeOutdate:
  enable: true
  style: flat
  limit_day: 365
  position: top
  message_prev: 本文已超过
  message_next: 天未更新，内容可能已过时，请注意甄别。

# ==========================================
# 文章编辑按钮（链接到 GitHub 编辑）
# ==========================================
post_edit:
  enable: false
  url: https://github.com/chasehl/chasehl.github.io/edit/main/source/

# ==========================================
# 回到顶部按钮
# ==========================================
rightside_scroll_percent: true

# ==========================================
# 鼠标点击效果
# ==========================================
click_heart: false

# ==========================================
# 网站标题打字效果（浏览器 tab）
# ==========================================
change_title_bar:
  enable: true
  hidden: 你去哪了？快回来！
  visible: 欢迎回来！

# ==========================================
# 访问统计（不蒜子）
# ==========================================
busuanzi:
  site_uv: true
  site_pv: true
  page_pv: true

# ==========================================
# 加载动画
# ==========================================
preloader:
  enable: true
  source: 1
  pace_css_url:

# ==========================================
# 图片描述（alt 文字显示）
# ==========================================
photofigcaption: true

# ==========================================
# 锚点链接
# ==========================================
anchor:
  button:
    enable: true
    always_show: false
  auto_update: false
